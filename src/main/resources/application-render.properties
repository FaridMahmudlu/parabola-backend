# Render Production Profile — PostgreSQL
spring.application.name=parabola-backend

# PostgreSQL on Supabase (via Connection Pooler — Transaction mode)
spring.datasource.url=jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.krsoxhbcyrnrqpkrkzfl
spring.datasource.password=${SUPABASE_DB_PASSWORD:!parabola0826!}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Pool Optimization (Optimized for Render & Supabase Pooler)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server port (Render assigns PORT dynamically)
server.port=${PORT:8080}

# Image uploads directory
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Clerk JWK Set URI
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://grateful-boxer-13.clerk.accounts.dev/.well-known/jwks.json

