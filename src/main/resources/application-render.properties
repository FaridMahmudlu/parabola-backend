# Render Production Profile — PostgreSQL
spring.application.name=parabola-backend

# PostgreSQL on Render (set DATABASE_URL env var on Render dashboard)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (Render assigns PORT dynamically)
server.port=${PORT:8080}

# Image uploads directory
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
