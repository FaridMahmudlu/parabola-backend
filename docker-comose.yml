version: '3.8'

services:
  parabola-db:
    image: mysql:8.0
    container_name: parabola-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: parabola_db
      MYSQL_USER: parabola_user
      MYSQL_PASSWORD: parabola_password
    ports:
      - "3307:3306"  
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: